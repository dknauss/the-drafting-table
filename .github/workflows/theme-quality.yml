name: Theme Quality

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: theme-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: 'true'
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP lint rules
        run: composer lint:php

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-fund --no-audit

      - name: Run Node syntax lint
        run: npm run lint:node

      - name: Run Node tests
        run: npm run test:node

      - name: Validate documentation commands
        run: npm run check:docs

      - name: Validate QA parity
        run: npm run check:qa-parity

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npm run env:start

      - name: Provision demo content
        run: npm run env:setup

      - name: Run PHPUnit coverage suite
        run: npm run test:phpunit:coverage

      - name: Validate PHPUnit coverage thresholds
        run: npm run test:phpunit:coverage:check

      - name: Run WP.org preflight checks
        run: npm run wporg:check

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

      - name: Stop wp-env
        if: always()
        run: npx --yes @wordpress/env stop || true
